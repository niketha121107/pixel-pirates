<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot head body -->
  <rect x="45" y="55" width="110" height="95" rx="14" fill="#8B7BB8" stroke="#6B5B98" stroke-width="2"/>
  
  <!-- Left ear -->
  <rect x="30" y="75" width="18" height="35" rx="8" fill="#8B7BB8" stroke="#6B5B98" stroke-width="2"/>
  
  <!-- Right ear -->
  <rect x="152" y="75" width="18" height="35" rx="8" fill="#8B7BB8" stroke="#6B5B98" stroke-width="2"/>
  
  <!-- Antenna -->
  <circle cx="100" cy="45" r="4" fill="#6B5B98"/>
  <line x1="100" y1="49" x2="100" y2="55" stroke="#6B5B98" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Left light -->
  <circle cx="65" cy="50" r="6" fill="#E8D5B7" stroke="#D4C4A0" stroke-width="1"/>
  
  <!-- Right light -->
  <circle cx="135" cy="50" r="6" fill="#E8D5B7" stroke="#D4C4A0" stroke-width="1"/>
  
  <!-- Center light -->
  <circle cx="100" cy="40" r="5" fill="#FFE082" stroke="#FFD54F" stroke-width="1"/>
  
  <!-- Left eye -->
  <circle cx="70" cy="80" r="8" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="70" cy="80" r="5" fill="#2C3E50"/>
  <circle cx="72" cy="78" r="2" fill="#FFFFFF"/>
  
  <!-- Right eye -->
  <circle cx="130" cy="80" r="8" fill="#F5F5F5" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="130" cy="80" r="5" fill="#2C3E50"/>
  <circle cx="132" cy="78" r="2" fill="#FFFFFF"/>
  
  <!-- Smile -->
  <path d="M 80 105 Q 100 120 120 105" stroke="#2C3E50" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>
